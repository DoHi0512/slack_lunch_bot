name: Daily Crawler

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 slack_sdk

      - name: Run Crawler
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: python main.py
